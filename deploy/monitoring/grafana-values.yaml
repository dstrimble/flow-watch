datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.monitoring.svc.cluster.local
        isDefault: true

sidecar:
  dashboards:
    enabled: true
    searchNamespace: monitoring
    label: grafana_dashboard
    labelValue: "1"