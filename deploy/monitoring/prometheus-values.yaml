serverFiles:
  alerting_rules.yml:
    groups:
      - name: flow-watch-batch
        rules:
          - alert: FlowWatchBatchJobFailed
            expr: |
              (
                flow_watch_batch_last_run_success{job="scrapeswpa"}
                or flow_watch_batch_last_run_success{exported_job="scrapeswpa"}
                or flow_watch_batch_last_run_success{job="get_usace_levels"}
                or flow_watch_batch_last_run_success{exported_job="get_usace_levels"}
              ) == 0
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: Flow Watch batch job failed
              description: One of the Flow Watch batch jobs is reporting a failed final state for at least 10 minutes.

          - alert: FlowWatchBatchJobDegraded
            expr: |
              (
                flow_watch_batch_last_run_degraded{job="get_usace_levels"}
                or flow_watch_batch_last_run_degraded{exported_job="get_usace_levels"}
              ) == 1
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: Flow Watch USACE batch is degraded
              description: The USACE levels batch completed with one or more partial upstream failures.

          - alert: FlowWatchScrapeSWPAStale
            expr: |
              time() - max(
                flow_watch_batch_last_run_timestamp_seconds{job="scrapeswpa"}
                or flow_watch_batch_last_run_timestamp_seconds{exported_job="scrapeswpa"}
              ) > 108000
            for: 30m
            labels:
              severity: warning
            annotations:
              summary: Flow Watch scrapeswpa is stale
              description: scrapeswpa has not reported a fresh run within 30 hours.

          - alert: FlowWatchUSACELevelsStale
            expr: |
              time() - max(
                flow_watch_batch_last_run_timestamp_seconds{job="get_usace_levels"}
                or flow_watch_batch_last_run_timestamp_seconds{exported_job="get_usace_levels"}
              ) > 7200
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: Flow Watch get_usace_levels is stale
              description: get_usace_levels has not reported a fresh run within 2 hours.

      - name: flow-watch-backend
        rules:
          - alert: FlowWatchBackendMetricsMissing
            expr: absent(flow_watch_http_requests_total)
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: Flow Watch backend metrics missing
              description: schedule-service metrics are missing from Prometheus for at least 10 minutes.

          - alert: FlowWatchBackendHigh5xxRate
            expr: |
              (
                sum(rate(flow_watch_http_requests_total{status_code=~"5.."}[5m]))
                /
                clamp_min(sum(rate(flow_watch_http_requests_total[5m])), 0.001)
              ) > 0.05
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Flow Watch backend 5xx rate is high
              description: schedule-service 5xx error ratio is above 5% for 10 minutes.

          - alert: FlowWatchBackendHighP95Latency
            expr: |
              histogram_quantile(
                0.95,
                sum by (le) (rate(flow_watch_http_request_duration_ms_bucket[5m]))
              ) > 1000
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Flow Watch backend p95 latency is high
              description: schedule-service p95 request latency is above 1 second for 10 minutes.