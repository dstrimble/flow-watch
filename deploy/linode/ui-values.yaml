replicaCount: 1

imagePullSecrets: []

image:
  repository: docker.io/dstrimble83/flow-watch-ui
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  name: flow-watch-ui

env:
  PORT: 80
  REACT_APP_API_HOST: https://api.flow-watch.com

ingress:
  enabled: false
  className: nginx
  host: flow-watch.com
  tls:
    - hosts:
        - flow-watch.com
      secretName: flow-watch-com
  annotations:
    cert-manager.io/cluster-issuer: production
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/from-to-www-redirect: "true"