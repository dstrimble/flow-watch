imagePullSecrets: []

image:
  repository: docker.io/dstrimble83/flow-watch-batch
  tag: 20260625-batch-degraded
  pullPolicy: IfNotPresent

secrets:
  mongoCredentialsName: mongo-credentials

resources:
  scrapeswpa:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  getusacelevels:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

pushgateway:
  url: http://pushgateway-prometheus-pushgateway.monitoring.svc.cluster.local:9091
  jobNames:
    scrapeswpa: scrapeswpa
    getusacelevels: get_usace_levels
  partialFailureMode:
    getusacelevels: degraded

global:
  MONGO_HOST: flow-watch-mongodb.flow-watch.svc.cluster.local
  MONGO_PORT: 27017
  MONGO_DB: flow-watch
  AUTH_SOURCE: admin

scrapeswpa:
  schedule: "0 7 * * *"
  MONGO_COLLECTION: swpa_schedule

getusacelevels:
  schedule: "20 * * * *"
  DAM_CODES_COLLECTION: dam_codes