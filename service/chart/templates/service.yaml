apiVersion: v1
kind: Service
metadata:
  name: schedule-service
  labels:
    app: schedule-service
  {{- with .Values.service.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3000
  selector:
    app: schedule-service
