name: Flow Watch - CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  # 1) Detect which apps changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      changed_count: ${{ steps.build-matrix.outputs.changed_count }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Figure out a reliable base/ref for all event types
      - name: Compute base/ref for diff
        id: git
        shell: bash
        run: |
          set -euo pipefail
          echo "event=${{ github.event_name }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --quiet
            echo "base=origin/${{ github.base_ref }}" >> $GITHUB_OUTPUT
            echo "ref=${{ github.sha }}"            >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            # previous commit before the push
            BEFORE="${{ github.event.before }}"
            if [[ -n "$BEFORE" && "$BEFORE" != "0000000000000000000000000000000000000000" ]]; then
              git fetch --quiet origin "$BEFORE":refs/remotes/origin/_before || true
              echo "base=$BEFORE" >> $GITHUB_OUTPUT
            else
              git fetch origin main --quiet
              echo "base=origin/main" >> $GITHUB_OUTPUT
            fi
            echo "ref=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            # workflow_dispatch / other → compare to origin/main
            git fetch origin main --quiet
            echo "base=origin/main"     >> $GITHUB_OUTPUT
            echo "ref=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
          echo "Base: $(cat $GITHUB_OUTPUT | sed -n 's/^base=//p')"
          echo "Ref : $(cat $GITHUB_OUTPUT | sed -n 's/^ref=//p')"

      # Show what Git thinks changed (nice sanity check)
      - name: Debug changed files
        shell: bash
        run: |
          echo "---- git diff --name-only ${{ steps.git.outputs.base }}...${{ steps.git.outputs.ref }} ----"
          git diff --name-only "${{ steps.git.outputs.base }}" "${{ steps.git.outputs.ref }}" || true

      # Paths filter with explicit base/ref (note: use arrays, case-sensitive paths)
      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ steps.git.outputs.base }}
          ref:  ${{ steps.git.outputs.ref }}
          list-files: json
          filters: |
            ui:
              - 'UI/**'
            service:
              - 'service/**'
            batch:
              - 'batch/**'

      # Print matched files per filter to verify patterns
      - name: Print filter matches
        shell: bash
        run: |
          echo "ui changed?                ${{ steps.filter.outputs.ui }}"
          echo "ui files (json):           ${{ steps.filter.outputs.ui_files_json }}"
          echo "service changed?           ${{ steps.filter.outputs.service }}"
          echo "service files (json):      ${{ steps.filter.outputs.service_files_json }}"
          echo "batch changed?             ${{ steps.filter.outputs.batch }}"
          echo "batch files (json):        ${{ steps.filter.outputs.batch_files_json }}"

      # Build the matrix from changed apps (your existing step)
      - name: Build matrix JSON from changed apps
        id: build-matrix
        shell: bash
        run: |
          set -euo pipefail
          APP_CATALOG='[
            {"app":"ui","path":"UI","image_repo":"flow-watch-ui"},
            {"app":"service","path":"service","image_repo":"flow-watch-service"},
            {"app":"batch","path":"batch","image_repo":"flow-watch-batch"}
          ]'

          changed_ui="${{ steps.filter.outputs.ui }}"
          changed_service="${{ steps.filter.outputs.service }}"
          changed_batch="${{ steps.filter.outputs.batch }}"

          CHANGED='[]'
          if [ "$changed_ui" = "true" ]; then CHANGED=$(echo "$CHANGED" | jq '. + ["ui"]'); fi
          if [ "$changed_service" = "true" ]; then CHANGED=$(echo "$CHANGED" | jq '. + ["service"]'); fi
          if [ "$changed_batch" = "true" ]; then CHANGED=$(echo "$CHANGED" | jq '. + ["batch"]'); fi

          MATRIX=$(jq -c --argjson changed "$CHANGED" \
            '{ include: [ .[] | select(.app as $a | $changed | index($a)) ] }' <<<"$APP_CATALOG")

          COUNT=$(jq -r '.include | length' <<<"$MATRIX")

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "changed_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Resolved matrix: $MATRIX"
          echo "Changed apps: $COUNT"

  # 2) Build & push Docker images for changed apps
  build:
    needs: changes
    if: ${{ needs.changes.outputs.changed_count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_repo }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}

      - name: Build & Push (UI/)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}